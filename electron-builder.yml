appId: com.memorylane.app
productName: MemoryLane
copyright: Copyright © 2026 Filip Kubis

directories:
  buildResources: assets
  output: dist

files:
  - out/**/*
  - package.json

extraResources:
  - from: assets
    to: assets
    filter:
      - '**/*'
  - from: src/main/processor/swift
    to: swift
    filter:
      - '*.swift'

asar: true
asarUnpack:
  - 'node_modules/uiohook-napi/**/*'
  - 'node_modules/sharp/**/*'
  - 'node_modules/better-sqlite3/**/*'
  - 'node_modules/sqlite-vec*/**/*'
  - 'node_modules/@img/**/*'
  - 'node_modules/onnxruntime-node/**/*'
  - 'node_modules/active-win/**/*'
  - '**/*.node'

afterSign: build/notarize.js

mac:
  category: public.app-category.productivity
  identity: 'Filip Kubis (ZN3J54N7AP)'
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  artifactName: '${productName}-${arch}-mac.${ext}'
  target:
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
